{% extends "dashboard/base.html" %}

{% block content %}
<form method="post" class="dp-form mx-auto max-w-lg space-y-6">
  {% csrf_token %}
  <p class="text-sm text-ink/60">Editing <span class="font-medium text-ink">{{ object.username }}</span></p>

  <div>
    <span class="mb-2 block text-sm font-medium text-ink/80">Roles</span>
    <div class="space-y-2">
      {% for checkbox in form.groups %}
        <label class="flex items-center gap-2 text-sm text-ink/80">
          {{ checkbox.tag }} {{ checkbox.choice_label }}
        </label>
      {% endfor %}
    </div>
  </div>

  <label class="flex items-center gap-2 text-sm text-ink/80">
    {{ form.is_active }} Active
  </label>

  <button type="submit" class="rounded-full bg-ink px-5 py-2.5 text-sm font-medium text-paper transition-transform hover:-translate-y-0.5">
    Save user
  </button>
</form>
{% endblock %}
